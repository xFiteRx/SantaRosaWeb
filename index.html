<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plataforma Institucional</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f2f5;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .card {
            background-color: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 400px;
        }
        h1 {
            color: #1a73e8;
            margin-bottom: 10px;
        }
        p {
            color: #5f6368;
            font-size: 16px;
        }
        .btn {
            background-color: #1a73e8;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.3s;
        }
        .btn:hover {
            background-color: #1557b0;
        }
    </style>
</head>
<body>

    <div class="card">
        <h1>Escuela Conectada</h1>
        <p>Este es el inicio de nuestro gran proyecto escolar dinámico.</p>
        <button class="btn" onclick="saludar()">Comenzar Proyecto</button>
    </div>

    <script>
        function saludar() {
            alert("¡Excelente! Has conectado tu código con GitHub con éxito.");
        }
    </script>

</body>
</html>
